name: Build Foundry Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, zum Beispiel v0.3.11
        required: true
        default: v0.4.1

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare package
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist/gothic-tales
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='dist' \
            --exclude='*.zip' \
            ./ dist/gothic-tales/

      - name: Build zip
        run: |
          set -euo pipefail
          cd dist
          zip -r gothic-tales.zip gothic-tales
          cp gothic-tales/system.json system.json

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/gothic-tales.zip dist/system.json --clobber
          else
            gh release create "$TAG" dist/gothic-tales.zip dist/system.json \
              --title "Gothic Tales ${TAG}" \
              --notes "Foundry-VTT-Systempaket für Gothic Tales."
          fi
