name: Gothic Tales 0.7.15 Upload

on:
  push:
    branches:
      - main
    paths:
      - ".github/gt-upload-0715/READY"

permissions:
  contents: write

jobs:
  deploy-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct and install Gothic Tales 0.7.15
        shell: bash
        run: |
          set -euo pipefail
          cat .github/gt-upload-0715/part-*.txt > /tmp/gothic-tales-0715.b64
          base64 --decode /tmp/gothic-tales-0715.b64 > /tmp/gothic-tales-0715.zip
          mkdir -p /tmp/gothic-tales-0715
          unzip -q /tmp/gothic-tales-0715.zip -d /tmp/gothic-tales-0715
          SOURCE_DIR="$(find /tmp/gothic-tales-0715 -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          test -f "$SOURCE_DIR/system.json"
          grep -q '"version": "0.7.15"' "$SOURCE_DIR/system.json"

          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            "$SOURCE_DIR/" ./

          rm -rf .github/gt-upload-0715
          rm -f .github/workflows/gt-upload-0715.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Release 0.7.15"
          git push origin HEAD:main
