name: Gothic Tales 0.7.15 Upload

on:
  push:
    branches:
      - main
    paths:
      - ".github/gt-upload-0715/READY"

permissions:
  contents: write

jobs:
  deploy-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct and install Gothic Tales 0.7.15
        shell: bash
        run: |
          set -euo pipefail
          cat .github/gt-upload-0715/part-*.b32 > /tmp/gothic-tales-0715.b32
          base32 --decode /tmp/gothic-tales-0715.b32 > /tmp/gothic-tales-0715.tar.xz
          mkdir -p /tmp/gothic-tales-0715
          tar -xJf /tmp/gothic-tales-0715.tar.xz -C /tmp/gothic-tales-0715
          test -f /tmp/gothic-tales-0715/system.json
          grep -q '"version": "0.7.15"' /tmp/gothic-tales-0715/system.json

          rsync -a /tmp/gothic-tales-0715/ ./
          rm -rf .github/gt-upload-0715
          rm -f .github/workflows/gt-upload-0715.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          TREE_SHA="$(git write-tree)"
          RELEASE_SHA="$(printf '%s\n' 'Release 0.7.15' | git commit-tree "$TREE_SHA" -p afeacd4f1956ff6e17e6c744419a9d76dece6415)"
          git push --force origin "$RELEASE_SHA:main"
